name: Issue Management Automation
on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const existingLabels = issue.labels.map(l => l.name);
            const labelsToAdd = [];

            // Add needs-triage if not already present
            if (!existingLabels.includes('needs-triage')) {
              labelsToAdd.push('needs-triage');
            }

            // Category labels
            if (title.includes('bug') && !existingLabels.includes('bug')) {
              labelsToAdd.push('bug');
            }
            if (title.includes('epic') && !existingLabels.includes('epic')) {
              labelsToAdd.push('epic');
            }
            if (title.includes('maintenance') && !existingLabels.includes('maintenance')) {
              labelsToAdd.push('maintenance');
            }

            // Priority labels (highest priority first)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityAssigned = existingLabels.some(l => l.startsWith('priority-'));
            if (!priorityAssigned) {
              for (const { keywords, label } of priorityKeywords) {
                if (keywords.some(k => title.includes(k) || body.includes(k))) {
                  labelsToAdd.push(label);
                  priorityAssigned = true;
                  break;
                }
              }

              if (!priorityAssigned) {
                labelsToAdd.push('priority-medium');
              }
            }

            // Add labels to issue
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
            }

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create Epic Sub-tasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const originalTitle = issue.title;
            const tasks = [
              "Requirements Analysis",
              "Design and Architecture",
              "Implementation",
              "Testing and Documentation"
            ];

            const subIssues = [];

            // Create sub-issues
            for (let i = 0; i < tasks.length; i++) {
              const taskName = tasks[i];
              const subTitle = `[SUBTASK] ${originalTitle} - Task ${i+1}: ${taskName}`;
              const subBody = `Related to #${parentNumber}`;

              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ['enhancement', 'needs-review']
              });

              subIssues.push(subIssue.data.number);
            }

            // Update parent issue with checklist
            const checklist = subIssues.map(num => `- [ ] #${num}`).join('\n');
            const newBody = `${issue.body || ''}\n\n## Epic Tasks\n${checklist}`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    steps:
      - name: Auto-respond to Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            const labels = issue.labels.map(l => l.name);

            // Check if first issue in repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              creator: author,
              state: 'all'
            });

            const isFirstIssue = authorIssues.data.length === 1;

            if (isFirstIssue) {
              if (!labels.includes('first-time-contributor')) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: ['first-time-contributor']
                });

                // Welcome message
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body: `Welcome @${author}! This is your first issue in this repository. We appreciate your contribution!`
                });
              }
            }

            // Determine response based on labels
            let response = '';

            if (labels.includes('bug')) {
              response += '### Bug Report Guidelines\nPlease ensure you have provided all necessary details to reproduce the bug, including steps, environment information, and screenshots if applicable.\n';
            }
            if (labels.includes('epic')) {
              response += '### Feature Request Process\nThis epic will be broken down into sub-tasks. Please review the checklist in the issue body for progress updates.\n';
            }
            if (labels.includes('maintenance')) {
              response += '### Maintenance Guidelines\nPlease provide details on the scope of the maintenance work and expected outcomes.\n';
            }

            if (response) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: response
              });
            }

            // Set milestone for high/critical priority
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              // Check if milestone v1.0.0 exists
              let milestone;
              try {
                milestone = await github.rest.issues.getMilestone({
                  owner,
                  repo,
                  milestone_number: 1
                });
              } catch (err) {
                if (err.status === 404) {
                  // Create milestone if not exists
                  milestone = await github.rest.issues.createMilestone({
                    owner,
                    repo,
                    title: 'v1.0.0',
                    state: 'open'
                  });
                } else {
                  throw err;
                }
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issueNumber,
                milestone: milestone.data.number
              });
            }

            // Change status from needs-triage to needs-review
            if (labels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issueNumber,
                name: 'needs-triage'
              });
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['needs-review']
              });
            }